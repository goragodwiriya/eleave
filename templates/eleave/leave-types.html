<aside data-component="sidebar"></aside>
<div class="main-content">
  <div>
    <header data-component="topbar"></header>
    <main class="content">
      <div class="card-groups">
        <header>
          <div>
            <h1 class="icon-calendar" data-i18n>Leave types</h1>
            <p data-i18n>Manage the master list of leave categories and annual entitlements</p>
          </div>
          <button class="btn btn-primary icon-new" data-action="click.prevent:requestApi" data-api-url="api/eleave/leavetype/get" data-api-method="get" data-i18n>{LNG_Add}
            {LNG_Leave Type}</button>
        </header>
        <div class="content-body">
          <div class="tablebody">
            <table class="table border fullwidth" data-table="leave-types" data-source="api/eleave/leavetypes" data-default-sort="id desc" data-page-size="25"
                   data-actions='{"delete":"Delete"}' data-action-url="api/eleave/leave-types/action" data-row-actions='{
                "edit": {
                  "label": "Edit",
                  "className": "btn btn-success icon-edit"
                }
              }'>
              <thead>
                <tr>
                  <th data-field="topic" data-i18n>{LNG_Topic}</th>
                  <th data-field="num_days" class="center" data-cell-class="center"
                      data-template="<span data-text='data.num_days == 0 ? &quot;{LNG_Unlimited}&quot; : data.num_days'></span>" data-i18n>{LNG_Number of leave days} </th>
                  <th data-field="is_active" class="center" data-cell-class="center"
                      data-template="<button class='btn-table-action' data-action='active' data-value='${is_active}'></button>" data-i18n>{LNG_Active}</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>
  <footer class="footer">
    <p class="center">&copy; 2026 Admin Framework - Powered by <a href="https://nowjs.net">Now.js</a></p>
  </footer>
</div>
